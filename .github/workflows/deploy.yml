name: Deploy client and server to Fly

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - name: ng-portfolio
            dir: ./apps/Client
            token: NG_PORTFOLIO

    concurrency:
      group: deploy-${{ matrix.app.name }}
      cancel-in-progress: true

    defaults:
      run:
        working-directory: ${{ matrix.app.dir }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ${{ matrix.app.name }}
        run: flyctl deploy --remote-only -a ${{ matrix.app.name }}
        env:
          FLY_API_TOKEN: ${{ secrets[matrix.app.token] }}
